name: Daily Sync

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 2 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  sync-lineups:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '*/30 * * * *'
    steps:
      - name: Sync lineups and upcoming fixtures
        run: |
          curl -sf -X GET https://falsenineapp.com/api/sync-lineups \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  sync-rankings:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 2 * * *'
    steps:
      - name: Sync rankings
        run: |
          curl -sf -X GET https://falsenineapp.com/api/sync-rankings \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  sync-full:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 23 * * *'
    steps:
      - name: Sync meta (teams, standings, fixtures)
        run: |
          curl -f --max-time 30 -X GET https://falsenineapp.com/api/sync-full-meta \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Sync match data rounds 1-46
        run: |
          for gw in $(seq 1 46); do
            echo "Syncing round $gw..."
            curl -f --max-time 30 -X GET "https://falsenineapp.com/api/sync-full-matches?gw=$gw" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
            echo ""
          done

      - name: Sync rankings
        run: |
          curl -f --max-time 30 -X GET https://falsenineapp.com/api/sync-rankings \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Sync predictions
        run: |
          curl -f --max-time 30 -X GET https://falsenineapp.com/api/sync-predictions \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"