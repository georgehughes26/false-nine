name: Sync Fixtures

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Hit sync endpoint
        run: |
          curl -L -X GET https://false-nine.vercel.app/api/sync \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"