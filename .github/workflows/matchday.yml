name: Matchday Sync

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  sync-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Sync scores
        run: |
          curl -sf -X GET https://falsenineapp.com/api/sync-scores \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  sync-events:
    runs-on: ubuntu-latest
    needs: sync-scores
    steps:
      - name: Sync events and stats
        run: |
          curl -sf -X GET https://falsenineapp.com/api/sync-events \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"